<ui:prop name="example_id" type="string" default="default" />

<f:switch expression="{example_id}">
    <f:case value="simple">
        <ui:accordion.examples.simple />
    </f:case>
    <f:case value="disabled">
        <ui:accordion.examples.disabled />
    </f:case>
    <f:case value="multiple">
        <ui:accordion.examples.multiple />
    </f:case>
</f:switch>
