<ui:switch.root defaultChecked="{true}">
    <ui:switch.label>Automatic updates</ui:switch.label>
    <div class="flex items-center gap-2 justify-between">
        <ui:switch.control />
        <ui:switch.indicator state="checked">On</ui:switch.indicator>
        <ui:switch.indicator state="unchecked">Off</ui:switch.indicator>
    </div>
</ui:switch.root>
