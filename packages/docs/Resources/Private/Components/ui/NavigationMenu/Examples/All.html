<ui:prop name="example_id" type="string" default="default" />

<f:switch expression="{example_id}">
    <f:case value="simple">
        <ui:navigationMenu.examples.simple />
    </f:case>
    <f:case value="with-links">
        <ui:navigationMenu.examples.withLinks />
    </f:case>
    <f:case value="with-viewport">
        <ui:navigationMenu.examples.withViewport />
    </f:case>
</f:switch>
