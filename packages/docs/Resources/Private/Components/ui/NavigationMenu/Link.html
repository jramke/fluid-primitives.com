<ui:useProps name="primitives:navigationMenu.link" />

<f:variable name="isNotInsideContent" value="{f:if(condition: '!{context.isInsideContent}', then: '{true}', else: '{false}')}" />

<ui:cn
    value="
        group inline-flex rounded-sm gap-1 border-0 bg-transparent text-sm cursor-pointer transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 data-[current]:font-medium data-[current]:text-foreground 
        {class}
    "
    when="{
        'px-4 py-[10px] font-medium': isNotInsideContent,  
        'px-2 py-1.5': context.isInsideContent,
        'underline underline-offset-4': current
    }"
    as="class" />

<primitives:navigationMenu.link spreadProps="{true}" class="{class}">
    <f:slot />
</primitives:navigationMenu.link>
