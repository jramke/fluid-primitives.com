<ui:prop name="example_id" type="string" default="default" />

<f:switch expression="{example_id}">
    <f:case value="simple">
        <ui:radioGroup.examples.simple />
    </f:case>
    <f:case value="disabled-group">
        <ui:radioGroup.examples.disabledGroup />
    </f:case>
    <f:case value="disabled-items">
        <ui:radioGroup.examples.disabledItems />
    </f:case>
</f:switch>
