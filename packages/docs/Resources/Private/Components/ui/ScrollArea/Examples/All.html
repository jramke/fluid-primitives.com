<ui:prop name="example_id" type="string" default="default" />

<f:switch expression="{example_id}">
    <f:case value="simple">
        <ui:scrollArea.examples.simple />
    </f:case>
    <f:case value="horizontal">
        <ui:scrollArea.examples.horizontal />
    </f:case>
    <f:case value="both-directions">
        <ui:scrollArea.examples.bothDirections />
    </f:case>
</f:switch>
