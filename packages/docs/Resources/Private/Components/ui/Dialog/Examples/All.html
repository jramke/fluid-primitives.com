<ui:prop name="example_id" type="string" default="default" />

<f:switch expression="{example_id}">
    <f:case value="simple">
        <ui:dialog.examples.simple />
    </f:case>
    <f:case value="alert">
        <ui:dialog.examples.alert />
    </f:case>
    <f:case value="prevent-close-escape">
        <ui:dialog.examples.preventCloseEscape />
    </f:case>
    <f:case value="prevent-close-outside">
        <ui:dialog.examples.preventCloseOutside />
    </f:case>
    <f:case value="nested">
        <ui:dialog.examples.nested />
    </f:case>
    <f:case value="with-popover">
        <ui:dialog.examples.withPopover />
    </f:case>
    <f:case value="inside-scroll">
        <ui:dialog.examples.insideScroll />
    </f:case>
    <f:case value="outside-scroll">
        <ui:dialog.examples.outsideScroll />
    </f:case>
</f:switch>

<ui:portalContainer />
